<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, noarchive">
    <title>View CV — Grace Duquiza Olesen</title>
    <style>
        :root {
            color-scheme: light;
            --navy: #071a35;
            --blue: #0d5278;
            --teal: #2dd4bf;
            --surface: #ffffff;
            --background: #eaf1f7;
            --text: #10213f;
            --muted: #52647f;
            --border: #cbd9e6;
        }

        * { box-sizing: border-box; }

        html { background: var(--background); }

        body {
            margin: 0;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 0%, rgba(45, 212, 191, .12), transparent 26rem),
                var(--background);
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            line-height: 1.55;
        }

        a { color: #075f7c; }
        a:focus-visible {
            outline: 3px solid var(--teal);
            outline-offset: 3px;
        }

        .viewer-header {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: .75rem max(1rem, calc((100% - 1100px) / 2));
            color: #fff;
            background: linear-gradient(110deg, var(--navy), var(--blue));
            border-bottom: 1px solid rgba(255, 255, 255, .16);
            box-shadow: 0 8px 24px rgba(7, 26, 53, .2);
        }

        .viewer-header h1 {
            margin: 0;
            font-size: clamp(1rem, 2vw, 1.3rem);
        }

        .back-link {
            flex: none;
            color: #d9f7f4;
            font-weight: 700;
            text-decoration: none;
        }

        .back-link:hover { text-decoration: underline; }

        .notice {
            margin: 0;
            padding: .65rem 1rem;
            color: #d9f4fa;
            background: rgba(255, 255, 255, .06);
            border-left: 3px solid var(--teal);
            font-size: .85rem;
        }

        .viewer-main {
            width: min(100% - 1.5rem, 1100px);
            margin: 0 auto;
            padding: 1.25rem 0 3rem;
        }

        .pages {
            display: grid;
            gap: 1.5rem;
        }

        .cv-page-wrap {
            position: relative;
            width: min(100%, 900px);
            margin: 0 auto;
            background: #fff;
            border: 1px solid var(--border);
            box-shadow: 0 18px 48px rgba(7, 26, 53, .16);
        }

        .cv-page {
            display: block;
            width: 100%;
            height: auto;
            -webkit-user-select: none;
            user-select: none;
        }

        .cv-link {
            position: absolute;
            z-index: 2;
            border-radius: 3px;
            background: transparent;
            transition: background-color .16s ease, box-shadow .16s ease;
        }

        .cv-link:hover {
            background: rgba(45, 212, 191, .18);
            box-shadow: 0 0 0 2px rgba(13, 82, 120, .32);
        }

        .cv-link:focus-visible {
            outline: 3px solid var(--teal);
            outline-offset: 2px;
        }

        .cv-link--email { left: 23.27%; top: 10.32%; width: 17.45%; height: 1.11%; }
        .cv-link--phone { left: 45.99%; top: 10.32%; width: 6.35%; height: 1.11%; }
        .cv-link--portfolio { left: 73.68%; top: 10.32%; width: 5.45%; height: 1.11%; }
        .cv-link--linkedin { left: 23.27%; top: 11.44%; width: 12.33%; height: 1.11%; }
        .cv-link--github { left: 40.87%; top: 11.44%; width: 8.31%; height: 1.11%; }
        .cv-link--nutri-live { left: 5.59%; top: 89.03%; width: 7.07%; height: 1.11%; }
        .cv-link--nutri-source { left: 14.35%; top: 89.03%; width: 9.32%; height: 1.11%; }
        .cv-link--tutor-source { left: 5.59%; top: 15.84%; width: 9.32%; height: 1.11%; }
        .cv-link--vocab-live { left: 5.59%; top: 26.46%; width: 8.22%; height: 1.11%; }
        .cv-link--sudoku-live { left: 5.59%; top: 37.23%; width: 8.22%; height: 1.11%; }
        .cv-link--tree-source { left: 5.59%; top: 49.06%; width: 9.32%; height: 1.11%; }
        .cv-link--publication { left: 69.46%; top: 22.48%; width: 5.84%; height: 1.39%; }

        @media (max-width: 650px) {
            .viewer-header { align-items: flex-start; flex-direction: column; gap: .5rem; }
            .notice { width: 100%; }
            .viewer-main { width: min(100% - .75rem, 1100px); padding-top: .5rem; }
            .pages { gap: .65rem; }
        }

        @media print {
            body { display: none !important; }
        }
    </style>
</head>
<body>
    <header class="viewer-header">
        <div>
            <h1>Grace Duquiza Olesen — CV</h1>
            <p class="notice">Clean CV preview · links inside the CV are clickable</p>
        </div>
        <a class="back-link" href="index.html#about">← Back to portfolio</a>
    </header>

    <main class="viewer-main">
        <section class="pages" aria-label="CV pages with interactive links">
            <div class="cv-page-wrap">
                <img
                    class="cv-page"
                    src="assets/cv-pages/cv-page-1.png"
                    width="1191"
                    height="1684"
                    alt="Page 1 of 2 of Grace Duquiza Olesen's CV"
                    draggable="false">
                <a class="cv-link cv-link--email" href="mailto:duquizagrace03@gmail.com" aria-label="Email Grace Duquiza Olesen"></a>
                <a class="cv-link cv-link--phone" href="tel:71392548" aria-label="Call Grace Duquiza Olesen"></a>
                <a class="cv-link cv-link--portfolio" href="https://graceduquiza.github.io" target="_blank" rel="noopener noreferrer" aria-label="Open Grace Duquiza Olesen's portfolio"></a>
                <a class="cv-link cv-link--linkedin" href="https://linkedin.com/in/graceduquizaolesen" target="_blank" rel="noopener noreferrer" aria-label="Open Grace Duquiza Olesen's LinkedIn profile"></a>
                <a class="cv-link cv-link--github" href="https://github.com/graceduquiza" target="_blank" rel="noopener noreferrer" aria-label="Open Grace Duquiza Olesen's GitHub profile"></a>
                <a class="cv-link cv-link--nutri-live" href="https://nutritsek.duquizaolesen.com" target="_blank" rel="noopener noreferrer" aria-label="Open the Nutri-Tsek live application"></a>
                <a class="cv-link cv-link--nutri-source" href="https://github.com/GraceDuquiza/Nutri-Tsek" target="_blank" rel="noopener noreferrer" aria-label="Open the Nutri-Tsek source code"></a>
            </div>
            <div class="cv-page-wrap">
                <img
                    class="cv-page"
                    src="assets/cv-pages/cv-page-2.png"
                    width="1191"
                    height="1684"
                    alt="Page 2 of 2 of Grace Duquiza Olesen's CV"
                    loading="lazy"
                    draggable="false">
                <a class="cv-link cv-link--tutor-source" href="https://github.com/GraceDuquiza/OnlinePythonTutor-Py3" target="_blank" rel="noopener noreferrer" aria-label="Open the Online Python Tutor source code"></a>
                <a class="cv-link cv-link--vocab-live" href="https://graceduquiza.github.io/Danish_Vocab_Trainer/" target="_blank" rel="noopener noreferrer" aria-label="Open the Danish Vocabulary Trainer live demo"></a>
                <a class="cv-link cv-link--sudoku-live" href="https://graceduquiza.github.io/SudokuGame/" target="_blank" rel="noopener noreferrer" aria-label="Open the Sudoku Learn live demo"></a>
                <a class="cv-link cv-link--tree-source" href="https://github.com/GraceDuquiza/Folder_Tree_Viewer/" target="_blank" rel="noopener noreferrer" aria-label="Open the Folder Tree Viewer source code"></a>
                <a class="cv-link cv-link--publication" href="https://doi.org/10.21698/rjeec.2025.210" target="_blank" rel="noopener noreferrer" aria-label="Open the peer-reviewed publication"></a>
            </div>
        </section>

    </main>

    <script>
        (() => {
            const blockedKeys = new Set(['p', 's', 'u']);

            document.addEventListener('contextmenu', event => event.preventDefault());
            document.addEventListener('dragstart', event => event.preventDefault());
            document.addEventListener('keydown', event => {
                const key = (event.key || '').toLowerCase();
                if ((event.ctrlKey || event.metaKey) && blockedKeys.has(key)) {
                    event.preventDefault();
                    event.stopPropagation();
                }
            }, true);
        })();
    </script>
</body>
</html>
